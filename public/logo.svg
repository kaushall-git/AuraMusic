<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Gradient Background representing Aura's premium aesthetic -->
    <linearGradient id="auraBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8A9C4" />
      <stop offset="60%" stop-color="#9d5ee5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>

    <!-- App Store Gloss / Subtle Radial Overlay for depth -->
    <radialGradient id="auraGlow" cx="50%" cy="15%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3" />
    </radialGradient>

    <!-- Drop shadow for the inner note to stand out with elegant Apple-style depth -->
    <filter id="iconDepth" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1e033d" flood-opacity="0.45" />
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.25" />
    </filter>

    <!-- Outer Card Subtle Shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <!-- Main iOS Squircle App Icon Base -->
    <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#auraBgGrad)" />
    <!-- Depth overlay -->
    <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#auraGlow)" style="mix-blend-mode: overlay;" />
    <!-- Fine inner border/stroke for premium definition -->
    <rect x="32" y="32" width="448" height="448" rx="104" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="2" />
  </g>

  <!-- Centered Symbol (Musical Note merged with Broadcast Waves) -->
  <g filter="url(#iconDepth)">
    <!-- Slanted Note Head -->
    <ellipse cx="175" cy="336" rx="42" ry="32" transform="rotate(-23 175 336)" fill="#FFFFFF" />

    <!-- Sleek Note Stem -->
    <rect x="201" y="146" width="16" height="192" rx="8" fill="#FFFFFF" />

    <!-- Broadcast Soundwaves radiating concentric from the Stem-axis (Center 201, 242) -->
    <!-- Sound Wave 1 (Inner) -->
    <path d="M 245,198 A 62,62 0 0,1 245,286" fill="none" stroke="#FFFFFF" stroke-width="15.5" stroke-linecap="round" />

    <!-- Sound Wave 2 (Middle) -->
    <path d="M 283,160 A 114,114 0 0,1 283,324" fill="none" stroke="#FFFFFF" stroke-width="15.5" stroke-linecap="round" />

    <!-- Sound Wave 3 (Outer) -->
    <path d="M 321,122 A 166,166 0 0,1 321,362" fill="none" stroke="#FFFFFF" stroke-width="15.5" stroke-linecap="round" />
  </g>
</svg>
